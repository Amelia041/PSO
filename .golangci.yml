version: "2"

linters:
  enable:
    - govet        # cek kesalahan logika (bawaan Go)
    - errcheck     # pastikan semua error di-handle
    - staticcheck  # analisis statis mendalam (sudah include gosimple di v2)
    - unused       # deteksi variabel/fungsi tidak dipakai
    - gocritic     # saran best practice

  settings:
    errcheck:
      check-type-assertions: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m