name: StudentSync CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/studentsync

jobs:

  # ── JOB 1: TEST ─────────────────────────────────────────────────
  test:
    name: Run Go Test
    runs-on: ubuntu-latest

    # go.mod ada di ROOT repo, bukan di ./backend
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install Dependencies
        run: go mod tidy

      - name: Run Unit Test
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}   # wajib inject, ConnectDB() butuh ini
        run: go test ./...

  # ── JOB 2: BUILD ────────────────────────────────────────────────
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build Binary
        # path ke main.go harus eksplisit karena working-directory = root
        run: go build -o studentsync ./backend/main.go

  # ── JOB 3: DOCKER BUILD & PUSH ──────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.DOCKER_IMAGE }}:latest \
            -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            .

      - name: Push Docker Image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:latest
          docker push ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  # ── JOB 4: DEPLOY KE AZURE ──────────────────────────────────────
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'   # hanya deploy dari branch main, bukan PR

    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}